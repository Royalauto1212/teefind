<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeeFind — Tee Times in Montreal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-900: #1a2e0e;
    --green-800: #243d14;
    --green-700: #2f5019;
    --green-600: #3B6D11;
    --green-500: #4d8a18;
    --green-400: #63a824;
    --green-200: #c0dd97;
    --green-50:  #f2f8ea;
    --sand-700: #6b5a3a;
    --sand-100: #f5eedd;
    --sand-50:  #faf7f0;
    --sky-600:  #185FA5;
    --sky-50:   #eef5fc;
    --red-600:  #c0392b;
    --ink:      #1a1c18;
    --ink-60:   rgba(26,28,24,0.6);
    --ink-30:   rgba(26,28,24,0.3);
    --ink-10:   rgba(26,28,24,0.08);
    --white:    #ffffff;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --shadow-card: 0 1px 3px rgba(26,28,24,0.06), 0 4px 12px rgba(26,28,24,0.04);
    --shadow-float: 0 8px 32px rgba(26,28,24,0.12);
    --transition: 160ms ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand-50); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  /* HEADER */
  header { background: var(--green-900); padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 60px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--white); letter-spacing: -0.02em; }
  .logo-text em { color: var(--green-400); font-style: normal; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.5); padding: 4px 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-400); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* TABS */
  .tabs { background: var(--green-800); padding: 0 2rem; display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .tab-btn { padding: 12px 20px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--green-400); }

  /* HERO */
  .hero { background: var(--green-800); padding: 2rem 2rem 0; position: relative; }
  .hero::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px); pointer-events: none; }
  .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(26px,3.5vw,40px); color: var(--white); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
  .hero h1 em { font-style: italic; color: var(--green-200); }
  .hero-sub { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 1.5rem; }

  /* FILTER CARD */
  .filter-card { background: var(--white); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 1.25rem 1.75rem; box-shadow: var(--shadow-float); position: sticky; top: 60px; z-index: 90; }
  .filter-row-main { display: grid; grid-template-columns: 140px 120px 100px 100px 110px 110px auto; gap: 10px; align-items: end; }
  .filter-row-extra { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }

  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 5px; }
  .field input, .field select { width: 100%; height: 40px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--sand-50); appearance: none; transition: border-color var(--transition), box-shadow var(--transition); outline: none; }
  .field input:focus, .field select:focus { border-color: var(--green-500); box-shadow: 0 0 0 3px rgba(77,138,24,0.12); background: var(--white); }
  .field.select-wrap { position: relative; }
  .field.select-wrap::after { content: ''; position: absolute; right: 10px; bottom: 13px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--ink-30); pointer-events: none; }

  .search-btn { height: 40px; padding: 0 20px; background: var(--green-600); color: white; border: none; border-radius: var(--radius-md); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: background var(--transition); }
  .search-btn:hover { background: var(--green-500); }

  /* EXTRA FILTERS */
  .filter-pill-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: none; border: 1.5px solid var(--ink-10); border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--ink-60); cursor: pointer; transition: all var(--transition); white-space: nowrap; }
  .filter-pill-btn:hover { border-color: var(--green-400); color: var(--green-600); background: var(--green-50); }
  .filter-pill-btn.active { border-color: var(--green-500); color: var(--green-600); background: var(--green-50); }
  .filter-pill-badge { background: var(--green-600); color: white; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 8px; }

  /* EXPANDABLE FILTER PANELS */
  .filter-panel { display: none; margin-top: 10px; border-top: 1.5px solid var(--ink-10); padding-top: 10px; }
  .filter-panel.open { display: block; }

  /* Distance filter */
  .distance-row { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
  .distance-row .field { flex: 1; min-width: 180px; }
  .distance-select-wrap { position: relative; min-width: 120px; }
  .distance-select-wrap select { height: 40px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--sand-50); appearance: none; outline: none; width: 100%; }
  .distance-select-wrap::after { content: ''; position: absolute; right: 10px; top: 14px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--ink-30); pointer-events: none; }

  /* Price range filter */
  .price-range-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .price-input { width: 90px; height: 40px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--sand-50); outline: none; }
  .price-input:focus { border-color: var(--green-500); background: var(--white); }
  .price-range-sep { font-size: 13px; color: var(--ink-60); }
  .price-range-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 5px; display: block; }

  /* Club filter */
  .club-filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .club-filter-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-60); }
  .club-filter-actions { display: flex; gap: 8px; }
  .club-filter-action { font-size: 12px; font-weight: 500; color: var(--green-600); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .club-filter-action:hover { text-decoration: underline; }
  .club-filter-sep { color: var(--ink-30); font-size: 12px; }
  .club-search-input { width: 100%; height: 34px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--sand-50); outline: none; margin-bottom: 8px; }
  .club-search-input:focus { border-color: var(--green-500); background: var(--white); }
  .club-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
  .club-checkbox-item { display: flex; align-items: center; gap: 7px; padding: 6px 9px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--ink); transition: background var(--transition); user-select: none; }
  .club-checkbox-item:hover { background: var(--sand-50); }
  .club-checkbox-item.selected { background: var(--green-50); color: var(--green-700); font-weight: 500; }
  .club-checkbox-item input[type="checkbox"] { accent-color: var(--green-600); width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
  .club-checkbox-item.hidden { display: none; }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 2rem; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .results-count { font-size: 14px; color: var(--ink-60); }
  .results-count strong { color: var(--ink); font-weight: 600; }

  /* PARENT CARD */
  .parent-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--ink-10); overflow: hidden; margin-bottom: 12px; transition: border-color var(--transition), box-shadow var(--transition); animation: slideIn .25s ease both; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
  .parent-card:hover { border-color: var(--green-200); box-shadow: var(--shadow-card); }
  .parent-card-header { padding: 1rem 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .parent-card-left { flex: 1; }
  .parent-card-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 2px; }
  .parent-card-name a { color: inherit; text-decoration: none; }
  .parent-card-name a:hover { color: var(--green-600); }
  .parent-card-subtitle { font-size: 12px; color: var(--ink-60); margin-bottom: 6px; }
  .parent-weather-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .parent-weather-icon { font-size: 24px; line-height: 1; }
  .parent-weather-text { font-size: 12px; color: var(--ink-60); }
  .parent-card-right { text-align: right; flex-shrink: 0; }
  .parent-price-range { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--green-600); letter-spacing: -0.02em; line-height: 1; }
  .parent-price-label { font-size: 11px; color: var(--ink-60); margin-top: 2px; }
  .distance-badge { font-size: 11px; color: var(--ink-60); margin-top: 4px; }

  .parent-courses { border-top: 1px solid var(--ink-10); }
  .course-section { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--ink-10); }
  .course-section:last-child { border-bottom: none; }
  .course-section-header { font-size: 11px; font-weight: 600; color: var(--ink-60); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em; }
  .course-bubbles-wrap { background: var(--sand-50); border-radius: var(--radius-md); padding: 9px 11px; }

  .time-bubbles { display: flex; flex-wrap: wrap; gap: 5px; }
  .time-bubble { padding: 5px 11px; border-radius: 16px; border: 1.5px solid var(--ink-10); font-size: 12px; font-weight: 500; color: var(--ink); background: var(--white); cursor: pointer; transition: all var(--transition); user-select: none; }
  .time-bubble:hover { border-color: var(--green-400); background: var(--green-50); color: var(--green-700); }
  .time-bubble.active { border-color: var(--green-600); background: var(--green-600); color: white; }
  .time-bubble.show-more { border-style: dashed; color: var(--ink-60); }
  .time-bubble.show-more:hover { border-color: var(--green-400); color: var(--green-600); background: var(--green-50); }

  .slot-detail { margin-top: 8px; padding: 10px 13px; background: var(--white); border-radius: var(--radius-md); border: 1.5px solid var(--green-200); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; animation: slideIn .15s ease both; }
  .slot-detail-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .slot-detail-time { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); }
  .slot-detail-weather { font-size: 13px; color: var(--ink-60); }
  .slot-detail-price { font-size: 14px; font-weight: 600; color: var(--ink); }
  .slot-detail-tax { font-size: 11px; color: var(--ink-60); }
  .slot-detail-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .book-btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; background: var(--green-600); color: white; text-decoration: none; border-radius: var(--radius-md); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: background var(--transition); }
  .book-btn:hover { background: var(--green-500); }
  .book-btn svg { width: 11px; height: 11px; }
  .alert-btn-sm { display: inline-flex; align-items: center; gap: 4px; padding: 7px 11px; background: transparent; color: var(--ink-60); border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
  .alert-btn-sm:hover { border-color: var(--green-400); color: var(--green-600); background: var(--green-50); }
  .min-players-note { font-size: 11px; color: #996600; background: #fef3d0; padding: 2px 7px; border-radius: 4px; font-weight: 600; }

  .empty-state, .select-prompt { text-align: center; padding: 4rem 2rem; color: var(--ink-60); }
  .empty-state svg, .select-prompt svg { width: 48px; height: 48px; stroke: var(--ink-30); margin-bottom: 1rem; }
  .empty-state h3, .select-prompt h3 { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink); margin-bottom: .5rem; }
  .empty-state p, .select-prompt p { font-size: 14px; max-width: 300px; margin: 0 auto; }

  /* ALERTS TAB */
  .alerts-page { max-width: 700px; margin: 2rem auto; padding: 0 2rem; display: none; }
  .alerts-page.active { display: block; }
  .alerts-page-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--ink-10); overflow: hidden; margin-bottom: 1rem; }
  .alerts-page-header { padding: 1.25rem 1.5rem; border-bottom: 1.5px solid var(--ink-10); }
  .alerts-page-header h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); margin-bottom: 4px; }
  .alerts-page-header p { font-size: 13px; color: var(--ink-60); line-height: 1.5; }
  .alerts-page-body { padding: 1.5rem; }
  .alert-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .alert-type-btn { padding: 10px 8px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); background: var(--sand-50); cursor: pointer; text-align: center; transition: all var(--transition); font-family: 'DM Sans', sans-serif; }
  .alert-type-btn:hover { border-color: var(--green-400); }
  .alert-type-btn.active { border-color: var(--green-500); background: var(--green-50); }
  .alert-type-icon { font-size: 20px; margin-bottom: 4px; display: block; }
  .alert-type-label { font-size: 12px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px; }
  .alert-type-sub { font-size: 11px; color: var(--ink-60); line-height: 1.3; }
  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 5px; }
  .form-row input, .form-row select { width: 100%; height: 40px; border: 1.5px solid var(--ink-10); border-radius: var(--radius-md); padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--sand-50); outline: none; appearance: none; transition: border-color var(--transition), box-shadow var(--transition); }
  .form-row input:focus, .form-row select:focus { border-color: var(--green-500); box-shadow: 0 0 0 3px rgba(77,138,24,0.12); background: var(--white); }
  .time-range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .create-alert-btn { width: 100%; height: 42px; background: var(--green-600); color: white; border: none; border-radius: var(--radius-md); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; transition: background var(--transition); }
  .create-alert-btn:hover { background: var(--green-500); }
  .alert-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--ink-10); }
  .alert-item:last-child { border-bottom: none; }
  .alert-item-text { font-size: 13px; color: var(--ink); line-height: 1.4; }
  .alert-item-sub { font-size: 11px; color: var(--ink-60); margin-top: 2px; }
  .delete-alert-btn { background: none; border: none; cursor: pointer; color: var(--ink-30); padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: color var(--transition); }
  .delete-alert-btn:hover { color: var(--red-600); }
  .no-alerts-msg { text-align: center; padding: 2rem; color: var(--ink-60); font-size: 14px; }

  .float-filter-btn { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 500; display: none; align-items: center; gap: 6px; padding: 10px 20px; background: var(--green-900); color: white; border: none; border-radius: 24px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 16px rgba(26,28,24,0.25); }
  .float-filter-btn.visible { display: flex; }
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: var(--green-900); color: white; padding: 10px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-float); animation: toastIn .25s ease both, toastOut .3s ease 2.7s both; pointer-events: auto; }
  @keyframes toastIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { to{opacity:0;transform:translateY(8px)} }

  @media (max-width: 900px) { .filter-row-main{grid-template-columns:1fr 1fr 1fr} .club-grid{grid-template-columns:repeat(2,1fr)} }
  @media (max-width: 540px) { header{padding:0 1rem} .hero h1{font-size:24px} .filter-row-main{grid-template-columns:1fr 1fr} .main{padding:1rem} .parent-card-name{font-size:18px} .parent-price-range{font-size:18px} .tabs{padding:0 1rem} }
</style>
</head>
<body>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" id="tabFind" onclick="switchTab('find')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Find a tee time
  </button>
  <button class="tab-btn" id="tabAlerts" onclick="switchTab('alerts')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Cancellation alerts
    <span id="alertTabBadge" style="display:none" class="filter-pill-badge">0</span>
  </button>
</div>

<!-- FIND TAB -->
<div id="findTab">
  <div class="hero">
    <div class="hero-inner">
      <h1>Find a tee time,<br><em>instantly.</em></h1>
      <p class="hero-sub">All your favourite Montreal courses, one search.</p>
      <div class="filter-card">
        <div class="filter-row-main">
          <div class="field">
            <label>Date</label>
            <input type="date" id="filterDate" onchange="doSearch()" />
          </div>
          <div class="field select-wrap">
            <label>Players</label>
            <select id="filterPlayers" onchange="applyFiltersAndRender()">
              <option value="">Players</option>
              <option value="1">1 player</option>
              <option value="2">2 players</option>
              <option value="3">3 players</option>
              <option value="4">4 players</option>
            </select>
          </div>
          <div class="field select-wrap">
            <label>From</label>
            <select id="filterTimeFrom" onchange="applyFiltersAndRender()">
              <option value="">Any</option>
              <option value="06:00">6 AM</option>
              <option value="07:00">7 AM</option>
              <option value="08:00">8 AM</option>
              <option value="09:00">9 AM</option>
              <option value="10:00">10 AM</option>
              <option value="11:00">11 AM</option>
              <option value="12:00">12 PM</option>
              <option value="13:00">1 PM</option>
              <option value="14:00">2 PM</option>
              <option value="15:00">3 PM</option>
              <option value="16:00">4 PM</option>
              <option value="17:00">5 PM</option>
            </select>
          </div>
          <div class="field select-wrap">
            <label>To</label>
            <select id="filterTimeTo" onchange="applyFiltersAndRender()">
              <option value="">Any</option>
              <option value="08:00">8 AM</option>
              <option value="09:00">9 AM</option>
              <option value="10:00">10 AM</option>
              <option value="11:00">11 AM</option>
              <option value="12:00">12 PM</option>
              <option value="13:00">1 PM</option>
              <option value="14:00">2 PM</option>
              <option value="15:00">3 PM</option>
              <option value="16:00">4 PM</option>
              <option value="17:00">5 PM</option>
              <option value="18:00">6 PM</option>
              <option value="19:00">7 PM</option>
              <option value="20:00">8 PM</option>
            </select>
          </div>
          <div class="field select-wrap">
            <label>Holes</label>
            <select id="filterHoles" onchange="applyFiltersAndRender()">
              <option value="">Any</option>
              <option value="9">9 holes</option>
              <option value="18">18 holes</option>
            </select>
          </div>
          <div class="field select-wrap">
            <label>Sort by</label>
            <select id="sortSelect" onchange="applyFiltersAndRender()">
              <option value="time">Earliest</option>
              <option value="price-asc">Price ↑</option>
              <option value="price-desc">Price ↓</option>
              <option value="distance">Distance</option>
              <option value="name">Name</option>
            </select>
          </div>
          <button class="search-btn" id="searchBtn" onclick="doSearch()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Search
          </button>
        </div>

        <!-- Extra filter pills -->
        <div class="filter-row-extra">
          <button class="filter-pill-btn" id="pillClub" onclick="togglePanel('clubPanel','pillClub')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            Filter by club
            <span class="filter-pill-badge" id="clubBadge" style="display:none">0</span>
          </button>
          <button class="filter-pill-btn" id="pillDistance" onclick="togglePanel('distancePanel','pillDistance')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.35 11.76a1 1 0 0 0 1.3 0C12.95 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/></svg>
            Near me
            <span class="filter-pill-badge" id="distanceBadge" style="display:none">✓</span>
          </button>
          <button class="filter-pill-btn" id="pillPrice" onclick="togglePanel('pricePanel','pillPrice')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Price range
            <span class="filter-pill-badge" id="priceBadge" style="display:none">✓</span>
          </button>
        </div>

        <!-- Club filter panel -->
        <div class="filter-panel" id="clubPanel">
          <div class="club-filter-header">
            <span class="club-filter-title">Select clubs</span>
            <div class="club-filter-actions">
              <button class="club-filter-action" onclick="selectAllClubs()">Show all</button>
              <span class="club-filter-sep">·</span>
              <button class="club-filter-action" onclick="checkAllClubs()">Check all</button>
            </div>
          </div>
          <input type="text" class="club-search-input" id="clubSearch" placeholder="Search clubs..." oninput="filterClubGrid()" />
          <div class="club-grid" id="clubGrid"></div>
        </div>

        <!-- Distance filter panel -->
        <div class="filter-panel" id="distancePanel">
          <div class="distance-row">
            <div class="field">
              <label>Address or postal code</label>
              <input type="text" id="locationInput" placeholder="e.g. H3H 1G6 or 123 Rue Principale" />
            </div>
            <div class="distance-select-wrap">
              <label style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-60);margin-bottom:5px;display:block;">Within</label>
              <select id="distanceKm" onchange="applyFiltersAndRender()">
                <option value="10">10 km</option>
                <option value="20" selected>20 km</option>
                <option value="30">30 km</option>
                <option value="50">50 km</option>
                <option value="100">100 km</option>
              </select>
            </div>
            <button class="search-btn" onclick="geocodeAndFilter()" style="margin-bottom:0">
              Apply
            </button>
            <button class="filter-pill-btn" onclick="clearDistance()" style="margin-bottom:0">Clear</button>
          </div>
        </div>

        <!-- Price range panel -->
        <div class="filter-panel" id="pricePanel">
          <label class="price-range-label">Price per player (CAD)</label>

// ── WEATHER ──
const WMO = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️' };
const WMO_DESC = { 0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Foggy',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm' };
const weatherCache = {};
const hourlyCache  = {};

async function fetchDailyWeather(courseId, lat, lng, date) {
  const key = `d-${courseId}-${date}`;
  if (weatherCache[key]) return weatherCache[key];
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America%2FToronto&start_date=${date}&end_date=${date}`);
    const d = await r.json();
    const code = d.daily?.weathercode?.[0];
    const result = { icon: WMO[code]||'🌤️', desc: WMO_DESC[code]||'', tmax: Math.round(d.daily?.temperature_2m_max?.[0]), tmin: Math.round(d.daily?.temperature_2m_min?.[0]) };
    weatherCache[key] = result;
    return result;
  } catch { return null; }
}

async function fetchHourlyWeather(courseId, lat, lng, date, hour) {
  const key = `h-${courseId}-${date}-${hour}`;
  if (hourlyCache[key]) return hourlyCache[key];
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,weathercode&timezone=America%2FToronto&start_date=${date}&end_date=${date}`);
    const d = await r.json();
    const hours = d.hourly?.time || [];
    const idx = hours.findIndex(t => t.includes(`T${String(hour).padStart(2,'0')}:`));
    if (idx < 0) return null;
    const endIdx = Math.min(idx + Math.ceil(ROUND_HOURS), hours.length - 1);
    const temps = d.hourly.temperature_2m.slice(idx, endIdx + 1);
    const codes = d.hourly.weathercode.slice(idx, endIdx + 1);
    const result = { tStart: Math.round(temps[0]), tEnd: Math.round(temps[temps.length-1]), icon: WMO[codes[0]]||'🌤️', iconEnd: WMO[codes[codes.length-1]]||'🌤️' };
    hourlyCache[key] = result;
    return result;
  } catch { return null; }
}

// ── DISTANCE ──
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocodeAndFilter() {
  const input = document.getElementById('locationInput').value.trim();
  if (!input) return;
  try {
    const isPostal = /^[A-Za-z]\d[A-Za-z]\s?\d[A-Za-z]\d$/.test(input.trim());
    const query = isPostal ? `${input.trim()}, Canada` : `${input}, Quebec, Canada`;
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
    const d = await r.json();
    if (d.length > 0) {
      userLocation = { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
      document.getElementById('distanceBadge').style.display = '';
      document.getElementById('pillDistance').classList.add('active');
      applyFiltersAndRender();
    } else {
      toast('Location not found. Try a postal code like H3H 2J8.');
    }
  } catch { toast('Could not geocode location.'); }
}

// ── API ──
async function loadTeeTimes() {

async function loadCourses() {
  try {
    const r = await fetch(`${API_BASE}/courses`);
    const courses = await r.json();
    allClubIds = courses.map(c => c.id);

    const parentGroups = {};
    for (const c of courses) {
      const group = CLUB_GROUPS[c.id];
      const parentName = group ? group.parent : c.name;

      parentGroups[parentName].push(c.id);

    document.getElementById('clubGrid').innerHTML = Object.entries(parentGroups)

        <input type="checkbox" onchange="onClubCheckGroup(this,'${ids.join(',')}')"/>${name}

// ── FILTERS ──
function applyFiltersAndRender() {
  const players  = document.getElementById('filterPlayers').value;
  const timeFrom = document.getElementById('filterTimeFrom').value;
  const timeTo   = document.getElementById('filterTimeTo').value;
  const holes    = document.getElementById('filterHoles').value;
  const sort     = document.getElementById('sortSelect').value;
  const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const distKm   = parseInt(document.getElementById('distanceKm').value) || 20;

  // Update price badge
  const hasPriceFilter = document.getElementById('priceMin').value || document.getElementById('priceMax').value;
  document.getElementById('priceBadge').style.display = hasPriceFilter ? '' : 'none';
  document.getElementById('pillPrice').classList.toggle('active', !!hasPriceFilter);

  if (!players) { showPrompt(); return; }

  let results = [...allTeeTimes];
  results = results.filter(t => t.source === 'foreup' ? t.players >= parseInt(players) : t.players === parseInt(players));
  if (selectedClubs.size > 0) results = results.filter(t => selectedClubs.has(t.courseId));
  if (holes)    results = results.filter(t => t.holes === parseInt(holes));
  if (timeFrom) results = results.filter(t => t.time >= timeFrom);
  if (timeTo)   results = results.filter(t => t.time <= timeTo);

  // Price filter
  if (hasPriceFilter) {
    results = results.filter(t => {
      if (!t.pricePerPlayer) return true; // keep TBD
      return t.pricePerPlayer >= priceMin && t.pricePerPlayer <= priceMax;
    });
  }

  // Group by courseId+holes
  const courseMap = {};
  for (const t of results) {
    const key = `${t.courseId}-${t.holes}`;
    if (!courseMap[key]) courseMap[key] = { ...t, slots: [] };
    courseMap[key].slots.push(t);
  }
  for (const key of Object.keys(courseMap)) {
    const seen = new Set();
    courseMap[key].slots = courseMap[key].slots
      .filter(s => { if (seen.has(s.time)) return false; seen.add(s.time); return true; })
      .sort((a,b) => a.time.localeCompare(b.time));
  }

  // Group into parents
  const parentMap = {};
  for (const course of Object.values(courseMap)) {
    const group = CLUB_GROUPS[course.courseId];
    const parentName = group ? group.parent : course.courseName;
    const parentUrl  = group ? group.url    : course.courseUrl || null;
    if (!parentMap[parentName]) {
      parentMap[parentName] = { parentName, parentUrl, courseId: course.courseId, courses: [], allSlots: [] };
    }
    parentMap[parentName].courses.push(course);
    parentMap[parentName].allSlots.push(...course.slots);
  }

  let parents = Object.values(parentMap);

  // Distance filter
  if (userLocation) {
    parents = parents.filter(p => {
      const coords = CLUB_COORDS[p.courseId];
      if (!coords) return true;
      return haversineKm(userLocation.lat, userLocation.lng, coords.lat, coords.lng) <= distKm;
    });
  }

  // Sort
  if (sort === 'time')       parents.sort((a,b) => (a.allSlots[0]?.time||'').localeCompare(b.allSlots[0]?.time||''));
  if (sort === 'price-asc')  parents.sort((a,b) => Math.min(...a.allSlots.map(s=>s.pricePerPlayer||999)) - Math.min(...b.allSlots.map(s=>s.pricePerPlayer||999)));
  if (sort === 'price-desc') parents.sort((a,b) => Math.max(...b.allSlots.map(s=>s.pricePerPlayer||0)) - Math.max(...a.allSlots.map(s=>s.pricePerPlayer||0)));
  if (sort === 'name')       parents.sort((a,b) => a.parentName.localeCompare(b.parentName));
  if (sort === 'distance' && userLocation) {
    parents.sort((a,b) => {
      const ca = CLUB_COORDS[a.courseId], cb = CLUB_COORDS[b.courseId];
      const da = ca ? haversineKm(userLocation.lat, userLocation.lng, ca.lat, ca.lng) : 999;
      const db = cb ? haversineKm(userLocation.lat, userLocation.lng, cb.lat, cb.lng) : 999;
      return da - db;
    });
  }

  document.getElementById('countNum').textContent = parents.length;
  activeSlot = null;

  if (!parents.length) {
    document.getElementById('resultsList').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.5" r="2.5"/><line x1="12" y1="7" x2="12" y2="18" stroke-width="1.5"/><line x1="8.5" y1="18" x2="15.5" y2="18" stroke-width="1.5"/></svg>
        <h3>No tee times found</h3>
        <p>Try adjusting your filters.</p>
        <p style="margin-top:1rem;">
          <button onclick="switchTab('alerts')" style="background:none;border:none;color:var(--green-600);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-decoration:underline;">
            Can't find what you're looking for? Set a cancellation alert →
          </button>
        </p>
      </div>\`; 
    return;
  }

  document.getElementById('resultsList').innerHTML = parents.map((p,i) => renderParentCard(p,i)).join('');
  setTimeout(() => loadWeatherForParents(parents), 100);
}

// ── RENDER ──
function renderParentCard(parent, idx) {
  const cardId   = `parent-${parent.parentName.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'')}`;
  const delay    = Math.min(idx * 40, 300);
  const prices   = parent.allSlots.map(s => s.pricePerPlayer).filter(Boolean);
  const minPrice = prices.length ? Math.min(...prices) : null;
  const maxPrice = prices.length ? Math.max(...prices) : null;
  const priceHtml = minPrice ? (minPrice === maxPrice ? `$${minPrice}` : `$${minPrice} – $${maxPrice}`) : 'TBD';
  const nameHtml = parent.parentUrl
    ? `<a href="${parent.parentUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${parent.parentName} ↗</a>`
    : parent.parentName;
  const coursesLabel = parent.courses.length > 1 ? `${parent.courses.length} courses` : '';

  let distHtml = '';
  if (userLocation) {
    const coords = CLUB_COORDS[parent.courseId];
    if (coords) {
      const km = haversineKm(userLocation.lat, userLocation.lng, coords.lat, coords.lng);
      distHtml = `<div class="distance-badge">📍 ${km.toFixed(1)} km away</div>`;
    }
  }

  return `
    <div class="parent-card" id="${cardId}" style="animation-delay:${delay}ms" data-parent='${JSON.stringify(parent)}'>
      <div class="parent-card-header">
        <div class="parent-card-left">
          <div class="parent-card-name">${nameHtml}</div>
          ${coursesLabel ? `<div class="parent-card-subtitle">${coursesLabel}</div>` : ''}
          <div class="parent-weather-row" id="weather-${cardId}">
            <span style="font-size:12px;color:var(--ink-30)">Loading weather...</span>
          </div>
          ${distHtml}
        </div>
        <div class="parent-card-right">
          <div class="parent-price-range">${priceHtml}</div>
          <div class="parent-price-label">CAD / player</div>
        </div>
      </div>
      <div class="parent-courses">
        ${parent.courses.map(c => renderCourseSection(c, cardId)).join('')}
      </div>
    </div>`;
}

function renderCourseSection(course, parentCardId) {
  const sectionId = `section-${course.courseId}-${course.holes}`;
  const visible   = course.slots.slice(0, BUBBLES_INIT);
  const hidden    = course.slots.slice(BUBBLES_INIT);
  const bubbles   = visible.map(s =>
    `<button class="time-bubble" onclick="toggleSlot('${sectionId}','${s.id}','${parentCardId}')" data-slot-id="${s.id}">${fmt12(s.time)}</button>`
  ).join('');
  const moreBubble = hidden.length > 0
    ? `<button class="time-bubble show-more" onclick="expandSection('${sectionId}','${parentCardId}')">+${hidden.length} more</button>` : '';

  const parentName = CLUB_GROUPS[course.courseId]?.parent || course.courseName;
  const label = course.courseName !== parentName ? course.courseName : `${course.holes} holes`;

  return `
    <div class="course-section" id="${sectionId}" data-slots='${JSON.stringify(course.slots)}' data-course-id="${course.courseId}">
      <div class="course-section-header">${label} · ${course.holes}h</div>
      <div class="course-bubbles-wrap">
        <div class="time-bubbles" id="bubbles-${sectionId}">${bubbles}${moreBubble}</div>
        <div id="detail-${sectionId}"></div>
      </div>
    </div>`;
}

function expandSection(sectionId, parentCardId) {
  const section = document.getElementById(sectionId);
  const slots   = JSON.parse(section.dataset.slots);
  const el      = document.getElementById(`bubbles-${sectionId}`);
  el.innerHTML  = slots.map(s =>
    `<button class="time-bubble" onclick="toggleSlot('${sectionId}','${s.id}','${parentCardId}')" data-slot-id="${s.id}">${fmt12(s.time)}</button>`
  ).join('') + `<button class="time-bubble show-more" onclick="collapseSection('${sectionId}','${parentCardId}')">Show less</button>`;
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function collapseSection(sectionId, parentCardId) {
  const section = document.getElementById(sectionId);
  const slots   = JSON.parse(section.dataset.slots);
  const el      = document.getElementById(`bubbles-${sectionId}`);
  const detail  = document.getElementById(`detail-${sectionId}`);
  const visible = slots.slice(0, BUBBLES_INIT);
  const hidden  = slots.slice(BUBBLES_INIT);
  el.innerHTML  = visible.map(s =>
    `<button class="time-bubble" onclick="toggleSlot('${sectionId}','${s.id}','${parentCardId}')" data-slot-id="${s.id}">${fmt12(s.time)}</button>`
  ).join('') + (hidden.length > 0 ? `<button class="time-bubble show-more" onclick="expandSection('${sectionId}','${parentCardId}')">+${hidden.length} more</button>` : '');
  detail.innerHTML = '';
  activeSlot = null;
}

async function toggleSlot(sectionId, slotId, parentCardId) {
  const section  = document.getElementById(sectionId);
  const slots    = JSON.parse(section.dataset.slots);
  const slot     = slots.find(s => s.id === slotId);
  const detail   = document.getElementById(`detail-${sectionId}`);
  const courseId = section.dataset.courseId;

  section.querySelectorAll('.time-bubble').forEach(b => b.classList.remove('active'));

  if (activeSlot && activeSlot.sectionId === sectionId && activeSlot.slotId === slotId) {
    detail.innerHTML = ''; activeSlot = null; return;
  }

  const clicked = section.querySelector(`[data-slot-id="${slotId}"]`);
  if (clicked) clicked.classList.add('active');
  activeSlot = { sectionId, slotId };

  const players    = document.getElementById('filterPlayers').value || '1';
  const bookingUrl = getBookingUrl(slot, players);
  const minNote    = (slot.minPlayers && slot.players < slot.minPlayers)
    ? `<span class="min-players-note">Min. ${slot.minPlayers} players</span>` : '';

  let weatherHtml = '';
  const coords = CLUB_COORDS[courseId];
  if (coords) {
    const hour = parseInt(slot.time.split(':')[0]);
    const w = await fetchHourlyWeather(courseId, coords.lat, coords.lng, slot.date, hour);
    if (w) weatherHtml = `<span class="slot-detail-weather">${w.icon} ${w.tStart}° → ${w.iconEnd} ${w.tEnd}°C</span>`;
  }

  detail.innerHTML = `
    <div class="slot-detail">
      <div class="slot-detail-left">
        <span class="slot-detail-time">${fmt12(slot.time)}</span>
        ${weatherHtml}${minNote}
        ${slot.pricePerPlayer
          ? `<span class="slot-detail-price">$${slot.pricePerPlayer} <span class="slot-detail-tax">CAD/player${slot.taxesMode?' '+slot.taxesMode:''}</span></span>`
          : `<span style="font-size:13px;color:var(--ink-60)">Price TBD</span>`}
      </div>
      <div class="slot-detail-actions">
        <a class="book-btn" href="${bookingUrl}" target="_blank" rel="noopener">
          Book <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="alert-btn-sm" onclick="prefillAlert('${slot.courseId}','${slot.date}','${slot.time}')">+ Alert</button>
      </div>
    </div>`;
}

async function loadWeatherForParents(parents) {
  const date = document.getElementById('filterDate').value;
  for (const parent of parents) {
    const coords = CLUB_COORDS[parent.courseId];
    const cardId = `parent-${parent.parentName.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'')}`;
    const el     = document.getElementById(`weather-${cardId}`);
    if (!el || !coords) { if(el) el.innerHTML=''; continue; }
    const w = await fetchDailyWeather(parent.courseId, coords.lat, coords.lng, date);
    if (!w) { el.innerHTML=''; continue; }
    el.innerHTML = `<span class="parent-weather-icon">${w.icon}</span><div><div style="font-size:13px;font-weight:500;color:var(--ink)">${w.tmax}° / ${w.tmin}°C</div><div class="parent-weather-text">${w.desc}</div></div>`;
  }
}

function getBookingUrl(slot, players) {
  if (slot.source === 'chronogolf') return slot.bookingUrl.replace(/nb_players=\d+/, 'nb_players='+players);
  if (slot.source === 'foreup')     return slot.bookingUrl;
  return slot.bookingUrl.replace(/nbplayers=\d+/, 'nbplayers='+players);
}

function fmt12(t) {
  const [hh,mm] = t.split(':').map(Number);
  return `${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`;
}

function showPrompt() {
  document.getElementById('countNum').textContent = '—';
  document.getElementById('resultsList').innerHTML = `
    <div class="select-prompt">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="1.5"/>
        <circle cx="9" cy="7" r="4" stroke-width="1.5"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke-width="1.5"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke-width="1.5"/>
      </svg>
      <h3>How many players?</h3>
      <p>Select the number of players above to see available tee times.</p>
    </div>`;
}

// ── CLUB FILTER ──
function onClubCheckGroup(cb, idsStr) {
  const ids = idsStr.split(',');
  if (cb.checked) { ids.forEach(id => selectedClubs.add(id)); cb.closest('.club-checkbox-item').classList.add('selected'); }
  else            { ids.forEach(id => selectedClubs.delete(id)); cb.closest('.club-checkbox-item').classList.remove('selected'); }
  updateClubBadge(); applyFiltersAndRender();
}

function selectAllClubs() {
  selectedClubs.clear();
  document.querySelectorAll('.club-checkbox-item input').forEach(cb => { cb.checked=false; cb.closest('.club-checkbox-item').classList.remove('selected'); });
  updateClubBadge(); applyFiltersAndRender();
}

function checkAllClubs() {
  document.querySelectorAll('.club-checkbox-item').forEach(label => {
    const ids = (label.dataset.ids||'').split(',');
    const cb = label.querySelector('input');
    cb.checked=true; label.classList.add('selected'); ids.forEach(id=>selectedClubs.add(id));
  });
  updateClubBadge(); applyFiltersAndRender();
}

function filterClubGrid() {
  const q = document.getElementById('clubSearch').value.toLowerCase();
  document.querySelectorAll('.club-checkbox-item').forEach(item => item.classList.toggle('hidden', !item.dataset.name.includes(q)));
}

function updateClubBadge() {
  const badge = document.getElementById('clubBadge');
  const btn   = document.getElementById('pillClub');
  const count = document.querySelectorAll('.club-checkbox-item.selected').length;
  if (count > 0) { badge.style.display=''; badge.textContent=count; btn.classList.add('active'); }
  else { badge.style.display='none'; if(!document.getElementById('clubPanel').classList.contains('open')) btn.classList.remove('active'); }
}

// ── ALERTS ──
function populateAlertCourseDropdown() {
  const sel    = document.getElementById('alertCourse');
  const unique = [...new Map(allTeeTimes.map(t=>[t.courseId,t])).values()].sort((a,b)=>a.courseName.localeCompare(b.courseName));
  sel.innerHTML = '<option value="">Any course</option>' + unique.map(t=>`<option value="${t.courseId}">${t.courseName}</option>`).join('');
}

function prefillAlert(courseId, date, time) {
  switchTab('alerts');
  const [hh] = time.split(':').map(Number);
  document.getElementById('alertCourse').value   = courseId;
  document.getElementById('alertDate').value     = date;
  document.getElementById('alertTimeFrom').value = `${String(Math.max(0,hh-1)).padStart(2,'0')}:00`;
  document.getElementById('alertTimeTo').value   = `${String(Math.min(23,hh+2)).padStart(2,'0')}:00`;
  document.getElementById('alertContact').focus();
}

async function createAlert() {
  const contact = document.getElementById('alertContact').value.trim();
  if (!contact) { toast('Please enter an email or phone number.'); return; }
  const alert = {
    id: Date.now(), type: 'date-window', contact,
    courseId: document.getElementById('alertCourse').value || null,
    date:     document.getElementById('alertDate').value || null,
    timeFrom: document.getElementById('alertTimeFrom').value || null,
    timeTo:   document.getElementById('alertTimeTo').value || null,
    players:  null,
    createdAt: new Date().toISOString(),
  };
  try { await fetch(`${API_BASE}/alerts`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(alert) }); } catch {}
  localAlerts.push(alert);
  localStorage.setItem('teefind_alerts', JSON.stringify(localAlerts));
  renderLocalAlerts();
  document.getElementById('alertContact').value = '';
  toast("Alert created! We'll notify you when a tee time opens up.");
}

function deleteAlert(id) {
  localAlerts = localAlerts.filter(a => a.id !== id);
  localStorage.setItem('teefind_alerts', JSON.stringify(localAlerts));
  renderLocalAlerts();
}

function renderLocalAlerts() {
  const badge = document.getElementById('alertTabBadge');
  badge.style.display = localAlerts.length ? '' : 'none';
  badge.textContent   = localAlerts.length;

  const html = localAlerts.length ? localAlerts.map(a => {
    const desc = a.type==='date-window'
      ? `${a.date} · ${fmtTime(a.timeFrom)} – ${fmtTime(a.timeTo)}`
      : `${allTeeTimes.find(t=>t.courseId===a.courseId)?.courseName||'Any course'}`;
    return `<div class="alert-item">
      <div><div class="alert-item-text">${desc}</div><div class="alert-item-sub">${a.contact}${a.players?` · ${a.players} players`:''}</div></div>
      <button class="delete-alert-btn" onclick="deleteAlert(${a.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`;
  }).join('') : '<div class="no-alerts-msg">No active alerts yet.</div>';

  const card2 = document.getElementById('activeAlertsCard2');
  const list2 = document.getElementById('alertsList2');
  card2.style.display = localAlerts.length ? '' : 'none';
  list2.innerHTML = html;
}

function fmtTime(t) {
  if (!t) return '';
  const [hh,mm] = t.split(':').map(Number);
  return `${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`;
}

function scrollToFilters() { window.scrollTo({top:0,behavior:'smooth'}); }

function toast(msg) {
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
</script>
